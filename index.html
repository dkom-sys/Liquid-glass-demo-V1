<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liquid Glass Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 200, 255, 0.35), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255, 0, 150, 0.25), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(0, 255, 150, 0.2), transparent 30%),
        linear-gradient(135deg, #0b1020, #111827 40%, #1f2937);
      background-attachment: fixed;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.05;
      background-image:
        radial-gradient(circle, white 1px, transparent 1px);
      background-size: 14px 14px;
      mix-blend-mode: soft-light;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
    }

    .glass-card {
      position: relative;
      width: min(92vw, 900px);
      padding: 40px;
      border-radius: 32px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.18),
        rgba(255, 255, 255, 0.08)
      );
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.25),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06);
      overflow: hidden;
      isolation: isolate;
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          120deg,
          rgba(255,255,255,0.35) 0%,
          rgba(255,255,255,0.08) 18%,
          rgba(255,255,255,0.02) 40%,
          transparent 60%
        );
      pointer-events: none;
      z-index: 0;
    }

    .glass-card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      top: -80px;
      right: -60px;
      background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 65%);
      filter: blur(10px);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      margin-bottom: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.7;
      color: rgba(255,255,255,0.86);
      max-width: 700px;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      text-decoration: none;
      color: white;
      padding: 14px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      box-shadow:
        0 4px 20px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.28);
    }

    .orb {
      position: fixed;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      filter: blur(24px);
      opacity: 0.35;
      pointer-events: none;
      z-index: -1;
      animation: float 12s ease-in-out infinite;
    }

    .orb.one {
      top: 10%;
      left: 8%;
      background: rgba(0, 191, 255, 0.7);
    }

    .orb.two {
      bottom: 10%;
      right: 12%;
      background: rgba(255, 0, 128, 0.6);
      animation-delay: -4s;
    }

    .orb.three {
      top: 55%;
      left: 45%;
      background: rgba(0, 255, 170, 0.45);
      animation-delay: -8s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0) scale(1);
      }
      25% {
        transform: translateY(-20px) translateX(15px) scale(1.05);
      }
      50% {
        transform: translateY(10px) translateX(-10px) scale(0.98);
      }
      75% {
        transform: translateY(-12px) translateX(18px) scale(1.02);
      }
    }

    .tilt {
      transform-style: preserve-3d;
      transition: transform 0.12s ease-out;
    }

    .glow-line {
      position: absolute;
      inset: auto 0 0 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
      );
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      .glass-card {
        padding: 24px;
        border-radius: 24px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>
  <div class="noise"></div>

  <section class="hero">
    <div class="glass-card tilt" id="glassCard">
      <div class="content">
        <div class="badge">Liquid Glass Demo</div>
        <h1>Soft. Glossy. Slightly illegal-looking.</h1>
        <p>
          This is a pure HTML/CSS/JS glassmorphism-style landing block you can host
          directly on GitHub Pages. It uses blur, layered highlights, gradients,
          and subtle motion to fake that premium “liquid glass” feel.
        </p>

        <div class="actions">
          <a href="#" class="btn">Primary Action</a>
          <a href="#" class="btn">Secondary Action</a>
        </div>
      </div>
      <div class="glow-line"></div>
    </div>
  </section>

  <script>
    const card = document.getElementById("glassCard");

    document.addEventListener("mousemove", (e) => {
      const rect = card.getBoundingClientRect();
      const cardX = rect.left + rect.width / 2;
      const cardY = rect.top + rect.height / 2;

      const offsetX = (e.clientX - cardX) / rect.width;
      const offsetY = (e.clientY - cardY) / rect.height;

      const rotateY = offsetX * 10;
      const rotateX = -offsetY * 10;

      card.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    document.addEventListener("mouseleave", () => {
      card.style.transform = `perspective(1200px) rotateX(0deg) rotateY(0deg)`;
    });
  </script>
</body>
</html>
